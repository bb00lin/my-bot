name: DailyStockPush

on:
  # ⚡ 自動排程觸發時一律使用 Cursor API（見下方 env 邏輯）
  # schedule:
  #   - cron: '20 08 * * 1-5' # 台北時間 16:20 執行 (UTC 08:20)
  workflow_dispatch:
    inputs:
      enable_gemini_ai:
        description: '🤖 啟動 Gemini AI 診斷服務 (消耗 Gemini Token)'
        type: boolean
        required: true
        default: false
      enable_cursor_ai:
        description: '🤖 啟動 Cursor AI 診斷服務 (消耗 Cursor Token)'
        type: boolean
        required: true
        default: false
  repository_dispatch:
    types: [trigger-push]

permissions:
  contents: read

jobs:
  run_job:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate AI provider selection
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.enable_gemini_ai }}" = "true" ] && [ "${{ github.event.inputs.enable_cursor_ai }}" = "true" ]; then
            echo "❌ 請只勾選 Gemini 或 Cursor 其中一項，不可同時勾選"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U tqdm requests pandas yfinance FinMind gspread oauth2client google-genai

      - name: Run DailyStockPush
        env:
          # 手動觸發：依勾選決定是否啟用 AI 與提供者 (二選一或都不勾)
          # 自動排程 / repository_dispatch：一律啟用 Cursor API
          ENABLE_AI: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.enable_gemini_ai == 'true' || github.event.inputs.enable_cursor_ai == 'true') && 'true' || (github.event_name != 'workflow_dispatch' && 'true' || 'false') }}
          AI_PROVIDER: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.enable_cursor_ai == 'true' && 'cursor' || (github.event.inputs.enable_gemini_ai == 'true' && 'gemini' || '')) || 'cursor' }}
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: python DailyStockPush.py
