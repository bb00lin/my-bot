name: worklog_to_confluence (Auto Sync)

on:
  workflow_dispatch: 
    inputs:
      line_user_id:
        description: 'LINE User ID of the triggerer'
        required: false
        default: ''
      line_display_name:
        description: 'LINE Display Name of the triggerer'
        required: false
        default: ''
  schedule:
    - cron: '0 19 * * 0-4'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 python-dotenv lxml line-bot-sdk

    - name: Run Confluence Script
      id: run_script
      env:
        CONF_URL: ${{ secrets.CONF_URL }}
        CONF_USER: ${{ secrets.CONF_USER }}
        CONF_PASS: ${{ secrets.CONF_PASS }}
        SHANNON_EMAIL: ${{ secrets.SHANNON_EMAIL }}
        SAM_EMAIL: ${{ secrets.SAM_EMAIL }}
        VIC_EMAIL: ${{ secrets.VIC_EMAIL }}
        SF_EMAIL: ${{ secrets.SF_EMAIL }}
        # 🌟 同步接收 LINE ID 與 顯示名稱
        LINE_USER_ID: ${{ github.event.inputs.line_user_id }}
        LINE_DISPLAY_NAME: ${{ github.event.inputs.line_display_name }}
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
      run: |
        python daily_worklog_to_confluence.py 2>&1 | tee output.txt

    - name: Send Success Email
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465   
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Done]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: file://output.txt

    - name: Send Failure Email
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: Confluence automation script [Fail]
        to: bb00lin@gmail.com
        from: GitHub Automation <${{ secrets.MAIL_USERNAME }}>
        body: |
          Confluence 自動日誌寫入執行失敗。
          
          請檢查 GitHub Actions Log 了解詳情。
