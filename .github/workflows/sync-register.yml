# SharePoint → Confluence → Jira 同步
# 僅手動觸發：workflow_dispatch / repository_dispatch（無 cron 自動排程）
name: Sync Register

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-register]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # 使用獨立檔案，避免覆寫 my-bot 既有 requirements.txt
        run: pip install -r requirements-sync.txt

      - name: Restore register snapshot cache
        uses: actions/cache@v4
        with:
          path: .register_cache
          key: register-snapshot-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            register-snapshot-${{ github.repository }}-

      - name: Prepare config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          if [ -n "$CONFIG_YAML" ]; then
            printf '%s\n' "$CONFIG_YAML" > config.yaml
            echo "Wrote config.yaml from CONFIG_YAML secret."
          elif [ -f config.yaml ]; then
            echo "Using committed config.yaml."
          else
            echo "::error::缺少 config.yaml。請設定 GitHub Secret CONFIG_YAML（完整 YAML 內容），或將不含密鑰的 config.yaml 提交至儲存庫。"
            exit 1
          fi

      - name: Prepare Atlassian credentials
        env:
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          if [ -z "$ATLASSIAN_API_TOKEN" ]; then
            echo "::error::缺少 Secret ATLASSIAN_API_TOKEN"
            exit 1
          fi
          echo "ATLASSIAN_API_TOKEN=$ATLASSIAN_API_TOKEN" > .env

      - name: Run sync_register.py
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SYNC_NOTIFY_EMAIL: ${{ secrets.SYNC_NOTIFY_EMAIL }}
        run: python sync_register.py

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-diff-${{ github.run_id }}
          path: |
            logs/
            最新同步差異.txt
          if-no-files-found: warn
          retention-days: 30
