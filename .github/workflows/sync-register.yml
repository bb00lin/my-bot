# SharePoint → Confluence → Jira 同步
# 主要排程：GitHub Actions cron（台灣 09:00 / 17:00）
# 亦可：workflow_dispatch 手動、repository_dispatch
#
# 寄信：與 Confluence Weekly2 Report（confluence_api2）相同
#   Secrets: MAIL_USERNAME / MAIL_PASSWORD（Gmail 應用程式密碼）
#   Host:    smtp.gmail.com:587（寫死在 sync_register.py，勿改 O365）
name: Sync Register

on:
  schedule:
    # Primary unattended schedule (Taiwan UTC+8)
    # 09:00 → 01:00 UTC；17:00 → 09:00 UTC
    - cron: "0 1 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [sync-register]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # 使用獨立檔案，避免覆寫 my-bot 既有 requirements.txt
        run: pip install -r requirements-sync.txt

      - name: Restore register snapshot cache
        uses: actions/cache@v4
        with:
          path: .register_cache
          key: register-snapshot-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            register-snapshot-${{ github.repository }}-

      - name: Prepare config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}
        run: |
          if [ -n "$CONFIG_YAML" ]; then
            # 明確以 UTF-8 寫入，避免中文標題（S 表格等）變成 ?
            python -c "import os, pathlib; pathlib.Path('config.yaml').write_text(os.environ['CONFIG_YAML'], encoding='utf-8', newline='\n')"
            echo "Wrote config.yaml from CONFIG_YAML secret (UTF-8)."
          elif [ -f config.yaml ]; then
            echo "Using committed config.yaml."
          else
            echo "::error::缺少 config.yaml。請設定 GitHub Secret CONFIG_YAML（完整 YAML 內容，UTF-8），或將不含密鑰的 config.yaml 提交至儲存庫。"
            exit 1
          fi

      - name: Prepare Atlassian credentials
        env:
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
        run: |
          if [ -z "$ATLASSIAN_API_TOKEN" ]; then
            echo "::error::缺少 Secret ATLASSIAN_API_TOKEN"
            exit 1
          fi
          echo "ATLASSIAN_API_TOKEN=$ATLASSIAN_API_TOKEN" > .env

      - name: Run sync_register.py
        env:
          # 與 Confluence Weekly2 / guardian / cosing 相同
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          # 可選：覆寫收件人（未設則用 config notify.email_to / 預設 bb00lin@gmail.com）
          SYNC_NOTIFY_EMAIL: ${{ secrets.SYNC_NOTIFY_EMAIL }}
        run: python sync_register.py

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-diff-${{ github.run_id }}
          path: |
            logs/
            最新同步差異.txt
          if-no-files-found: warn
          retention-days: 30
