# 複製為 config.yaml 並填入實際值；API Token 建議放在 .env

atlassian:
  site_url: "https://qsiaiot.atlassian.net"
  cloud_id: "2657b5c5-bbc7-4469-9e06-6bc58db3de73"
  email: "your.email@company.com"
  # api_token 請設在 .env：ATLASSIAN_API_TOKEN=...

# 寂靜寫入：Jira ?notifyUsers=false；Confluence version.minorEdit=true
silent_mode: true

# 同步後差異報告
# - 本機：寫入 logs/sync_*.log、logs/latest_diff.txt、最新同步差異.txt（無差異也會寫「無差異」）
# - GitHub Actions：寄信（無差異也寄），並附 S 表格連結
notify:
  email_to: "bob.lin@qsitw.com"
  # Cc 可為字串或 list；與 To 分離（勿把 Cc 寫進 email_to）
  email_cc: "shannon.chang@qsitw.com,vic.wu@qsitw.com"
  # email_cc:
  #   - "shannon.chang@qsitw.com"
  #   - "vic.wu@qsitw.com"
  email_on_github: true
  # email_always: false
  # mail_backend: auto   # auto|smtp|graph
  # smtp_host: "smtp.gmail.com"   # 未設時依 MAIL_USERNAME 網域推斷；亦可設 Secret SMTP_HOST
  # smtp_port: 587
  # Graph secrets: GRAPH_TENANT_ID / GRAPH_CLIENT_ID / GRAPH_CLIENT_SECRET
  # graph_mailbox: "user@company.com"  # 可選；否則用 MAIL_USERNAME

sharepoint:
  # Sync 腳本下載 Excel 用（必須是 download.aspx）
  download_url: "https://qsitw-my.sharepoint.com/:x:/r/personal/challo_chen_qsitw_com/_layouts/15/download.aspx?share=IQAyqQjNe2bmSp28QrFpnf_sAbL5gqBzp6h3RSCwPKx2cbY"
  # Confluence 頁首 S 表連結：瀏覽器開啟網頁版（由 share token 轉成 :x:/g/personal/... 形式）
  view_url: "https://qsitw-my.sharepoint.com/:x:/g/personal/challo_chen_qsitw_com/IQAyqQjNe2bmSp28QrFpnf_sAbL5gqBzp6h3RSCwPKx2cbY"
  sheet_name: "Register"
  # 可選：若下載 header 抓不到檔名，郵件主旨 [bracket] 可退回此值（含或不含 .xlsx）
  # register_filename: "C27_VOX-QSI_Open_Issues_Register_20260702.xlsx"

confluence:
  page_id: "189300768"
  page_title: "mail_checking"
  version_message: "Synced from SharePoint register"
  # 頁首 S 表連結顯示名稱（須 UTF-8；設定 CONFIG_YAML secret 時勿用會破壞中文的編碼）
  source_link_title: "C27 Open Issues Register (S 表格)"
  # source_link_url 可覆寫；未設時依序用 sharepoint.view_url → download_url

jira:
  project_key: "PMWC"
  epic_issue_type: "大型工作"
  task_issue_type: "任務"
  # PMWC team-managed：Start date = customfield_10015，Due date = duedate
  start_date_field: "customfield_10015"
  due_date_field: "duedate"
  # 未指派時預設受託人
  default_assignee_account_id: "712020:a50a0ee0-1928-47a7-a135-a07c21c233ce"
  default_assignee_query: "shannon"

# C 表格欄位 = S 表欄位（同順序）+ 最後 LINK 欄
confluence_columns:
  - ID
  - JIRA
  - Workstream
  - Title
  - Description / current state
  - Next action
  - Ball with
  - Priority
  - Status
  - Opened
  - Target close
  - Next milestone / due
  - Source / reference
  - QSI Comment
  - LINK
